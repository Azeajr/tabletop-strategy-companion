name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '!src/**/*.test.*'
      - 'public/**'
      - 'data/seeds/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm audit signatures

      - run: npm test

      - run: npm run build

      - name: Check bundle size (15 MB cap)
        run: |
          node -e "
            const {readdirSync, statSync} = require('fs');
            const walk = d => readdirSync(d, {withFileTypes:true})
              .flatMap(f => f.isDirectory() ? walk(d+'/'+f.name) : [d+'/'+f.name]);
            const bytes = walk('dist').reduce((s,f) => s + statSync(f).size, 0);
            const mb = (bytes / 1_000_000).toFixed(2);
            console.log('Bundle size:', mb + ' MB');
            if (bytes > 15_000_000) { console.error('Exceeds 15 MB cap'); process.exit(1); }
          "

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name tabletop-companion
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5141f0dec18e8fb0aa0942a9f09f982d
